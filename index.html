<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudPulse</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: #fff;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111827;
      border-bottom: 1px solid #2d3748;
    }

    h1 {
      margin: 0;
      color: #facc15;
    }

    p {
      color: #cbd5e1;
    }

    .topbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    button {
      background: #facc15;
      color: #111827;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #111827;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 16px;
    }

    .card h3 {
      margin-top: 0;
      color: #f8fafc;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .status {
      text-align: center;
      padding: 20px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <header>
    <h1>CloudPulse</h1>
    <p>Cloud & DevOps News</p>
  </header>

  <div class="topbar">
    <button onclick="fetchNews()">Refresh News</button>
  </div>

  <div class="container">
    <div id="status" class="status">Loading news...</div>
    <div id="newsGrid" class="grid"></div>
  </div>

  <script>
    async function fetchNews() {
      const status = document.getElementById("status");
      const grid = document.getElementById("newsGrid");

      status.textContent = "Loading latest news...";
      grid.innerHTML = "";

      try {
        const res = await fetch("/api/news", {
          method: "POST"
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Failed to fetch news");
        }

        status.textContent = "";
        grid.innerHTML = "";

        data.forEach(article => {
          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <h3>${article.title}</h3>
            <div class="meta">${article.source} • ${article.category}</div>
            <p>${article.summary}</p>
          `;

          grid.appendChild(card);
        });
      } catch (err) {
        status.textContent = "Error: " + err.message;
      }
    }

    fetchNews();
  </script>
</body>
</html>
